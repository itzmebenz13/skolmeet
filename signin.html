<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkolMeet - Sign In & Join</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['"Playfair Display"', 'serif'],
                    },
                }
            }
        }
    </script>
    <style>
        html, body {
            height: 100dvh;
            overflow: hidden !important;
        }
        html {
            font-size: 90%;
        }
        @media (max-width: 640px) {
            html {
                font-size: 80%;
            }
        }
        body {
            font-family: 'Inter', sans-serif;
            background: 
                radial-gradient(circle at 10% 20%, rgba(255,195,160,0.6) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(161,140,209,0.6) 0%, transparent 50%),
                radial-gradient(circle at 90% 10%, rgba(79,172,254,0.6) 0%, transparent 50%),
                radial-gradient(circle at 10% 90%, rgba(255,154,158,0.6) 0%, transparent 50%);
            background-color: #dbe2ef;
            background-size: cover;
            background-attachment: fixed;
        }

        /* Abstract blobs for reference-like background depth */
        .blob-1 { position: absolute; top: -10%; left: -10%; width: 50vw; height: 50vw; border-radius: 50%; background: radial-gradient(circle, rgba(161,140,209,0.8), transparent); filter: blur(80px); z-index: -1; animation: drift 20s infinite alternate; }
        .blob-2 { position: absolute; bottom: -20%; right: -10%; width: 60vw; height: 60vw; border-radius: 50%; background: radial-gradient(circle, rgba(79,172,254,0.7), transparent); filter: blur(100px); z-index: -1; animation: drift 25s infinite alternate-reverse; }
        .blob-3 { position: absolute; top: 30%; left: 30%; width: 40vw; height: 40vw; border-radius: 50%; background: radial-gradient(circle, rgba(255,195,160,0.6), transparent); filter: blur(90px); z-index: -1; animation: drift 30s infinite alternate; }
        
        @keyframes drift {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(10%, 10%) scale(1.1); }
        }

        .input-block input {
            /* Removing background specifically for autocomplete */
            background-color: transparent !important;
        }
        .input-block:focus-within {
            background-color: rgba(255,255,255,0.7);
            border-color: rgba(255,255,255,0.8);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center relative px-4 antialiased overflow-hidden">

    <!-- Deep Background Blobs -->
    <div class="blob-1"></div>
    <div class="blob-2"></div>
    <div class="blob-3"></div>

    <!-- Main Container Card -->
    <div class="relative w-full max-w-[440px] bg-white/20 backdrop-blur-2xl border border-white/40 rounded-[2.5rem] p-6 sm:p-10 shadow-[0_30px_60px_rgba(0,0,0,0.12)] flex flex-col z-10 -translate-y-6 sm:translate-y-0">
        
        <!-- Header -->
        <div class="flex flex-col items-center mb-4 sm:mb-6">
            <div class="flex items-center gap-2 mb-2 sm:mb-3">
                <img src="images/header-logo.png" alt="SkolMeet Logo" class="h-10 sm:h-14 w-auto object-contain">
            </div>
            <h1 id="form-title" class="text-xl sm:text-[1.7rem] font-bold text-gray-900 tracking-tight mb-0.5 sm:mb-1">Registration</h1>
            <p id="form-subtitle" class="text-xs sm:text-sm text-gray-700/80 font-medium">Step into the ultimate student network.</p>
        </div>

        <!-- Toggle Switch -->
        <div class="w-full bg-white/40 backdrop-blur-md rounded-full p-1.5 flex relative mb-5 sm:mb-8 shadow-[inset_0_2px_4px_rgba(0,0,0,0.02)] border border-white/50">
            <!-- Active Indicator Background -->
            <div id="toggle-bg" class="absolute top-1.5 bottom-1.5 left-1.5 w-[calc(50%-6px)] bg-white/80 rounded-full shadow-sm transition-transform duration-300 ease-[cubic-bezier(0.4,0,0.2,1)]"></div>
            
            <button onclick="switchTab('signin')" id="btn-signin" class="relative z-10 w-1/2 text-center py-2.5 text-sm font-medium transition-colors text-gray-700 focus:outline-none">Sign in</button>
            <button onclick="switchTab('signup')" id="btn-signup" class="relative z-10 w-1/2 text-center py-2.5 text-sm font-bold text-gray-900 transition-colors focus:outline-none">Sign up</button>
        </div>

        <!-- Form Fields Container -->
        <form onsubmit="event.preventDefault();" class="flex flex-col gap-2 sm:gap-3">
            
            <!-- Full Name Block -->
            <div id="name-block" class="input-block w-full bg-white/40 backdrop-blur-md border border-white/50 rounded-2xl flex items-center p-2 sm:p-2.5 transition-all cursor-text" onclick="document.getElementById('signup-name').focus()">
                <!-- Left Icon (User) -->
                <div class="w-10 flex justify-center text-gray-800">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
                </div>
                <!-- Vertical Divider -->
                <div class="w-px h-8 bg-gray-400/30 mx-2"></div>
                <!-- Center Text -->
                <div class="flex-grow flex flex-col justify-center px-1">
                    <label class="text-[9px] text-gray-500 uppercase tracking-wide font-bold mb-0.5 pointer-events-none">Full Name</label>
                    <input id="signup-name" type="text" placeholder="Anne Curtis" class="w-full bg-transparent text-sm font-bold text-gray-900 focus:outline-none placeholder-gray-500/70" />
                </div>
                <!-- Right Icon (Success Check) -->
                <div class="w-8 flex justify-center">
                    <svg class="w-5 h-5 text-emerald-500 hidden valid-check" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
                    </svg>
                </div>
            </div>

            <!-- Email Block -->
            <div class="input-block w-full bg-white/40 backdrop-blur-md border border-white/50 rounded-2xl flex items-center p-2 sm:p-2.5 transition-all cursor-text" onclick="document.getElementById('email').focus()">
                <!-- Left Icon (Mail) -->
                <div class="w-10 flex justify-center text-gray-800">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" /></svg>
                </div>
                <!-- Vertical Divider -->
                <div class="w-px h-8 bg-gray-400/30 mx-2"></div>
                <!-- Center Text -->
                <div class="flex-grow flex flex-col justify-center px-1">
                    <label class="text-[9px] text-gray-500 uppercase tracking-wide font-bold mb-0.5 pointer-events-none">Email Address</label>
                    <input id="email" type="email" placeholder="student@school.edu" class="w-full bg-transparent text-sm font-bold text-gray-900 focus:outline-none placeholder-gray-500/70" />
                </div>
                <!-- Right Icon (Success Check) -->
                <div class="w-8 flex justify-center">
                    <svg class="w-5 h-5 text-emerald-500 hidden valid-check" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
                    </svg>
                </div>
            </div>

            <!-- Password Block -->
            <div class="input-block w-full bg-white/40 backdrop-blur-md border border-white/50 rounded-2xl flex items-center p-2 sm:p-2.5 transition-all cursor-text" onclick="document.getElementById('password').focus()">
                <!-- Left Icon (Key) -->
                <div class="w-10 flex justify-center text-gray-800">
                    <svg class="w-5 h-5 transform -rotate-45" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" /></svg>
                </div>
                <!-- Vertical Divider -->
                <div class="w-px h-8 bg-gray-400/30 mx-2"></div>
                <!-- Center Text -->
                <div class="flex-grow flex flex-col justify-center px-1">
                    <label class="text-[9px] text-gray-500 uppercase tracking-wide font-bold mb-0.5 pointer-events-none">Password</label>
                    <input id="password" type="password" placeholder="••••••••" class="w-full bg-transparent text-sm font-bold text-gray-900 focus:outline-none placeholder-gray-500/70 tracking-widest" />
                </div>
                <!-- Right Icon (Success Check) -->
                <div class="w-8 flex justify-center">
                    <svg class="w-5 h-5 text-emerald-500 hidden valid-check" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
                    </svg>
                </div>
            </div>

            <!-- Confirm Password Block -->
            <div id="confirm-password-block" class="input-block w-full bg-white/40 backdrop-blur-md border border-white/50 rounded-2xl flex items-center p-2 sm:p-2.5 transition-all cursor-text" onclick="document.getElementById('confirm-password').focus()">
                <!-- Left Icon (Key) -->
                <div class="w-10 flex justify-center text-gray-800">
                    <svg class="w-5 h-5 transform -rotate-45" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" /></svg>
                </div>
                <!-- Vertical Divider -->
                <div class="w-px h-8 bg-gray-400/30 mx-2"></div>
                <!-- Center Text -->
                <div class="flex-grow flex flex-col justify-center px-1">
                    <label class="text-[9px] text-gray-500 uppercase tracking-wide font-bold mb-0.5 pointer-events-none">Confirm Password</label>
                    <input id="confirm-password" type="password" placeholder="••••••••" class="w-full bg-transparent text-sm font-bold text-gray-900 focus:outline-none placeholder-gray-500/70 tracking-widest" />
                </div>
                <!-- Right Icon (Success Check) -->
                <div class="w-8 flex justify-center">
                    <svg class="w-5 h-5 text-emerald-500 hidden valid-check" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
                    </svg>
                </div>
            </div>

            <!-- Checkbox Terms -->
            <div id="terms-container" class="w-full flex items-center gap-2.5 mt-2 mb-4 ml-2">
                <div class="relative flex items-center justify-center">
                    <input type="checkbox" id="terms" class="appearance-none w-4 h-4 border-[1.5px] border-gray-800 rounded-[4px] bg-transparent checked:bg-gray-900 checked:border-gray-900 focus:outline-none transition-colors cursor-pointer peer">
                    <svg class="absolute w-3 h-3 text-white pointer-events-none hidden peer-checked:block" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" />
                    </svg>
                </div>
                <label for="terms" class="text-[11px] sm:text-xs text-gray-800 cursor-pointer select-none font-bold">I agree to the Terms and Privacy Policy</label>
            </div>

            <!-- Submit Button -->
            <button id="submit-btn" type="submit" class="w-full bg-black text-white rounded-2xl py-3 sm:py-4 flex items-center justify-center gap-2 text-sm font-semibold hover:bg-gray-800 hover:scale-[1.02] transition-all shadow-[0_10px_20px_rgba(0,0,0,0.1)]">
                <span id="submit-text">Create Account</span>
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
            </button>
            
            <!-- Forgot Password (Only shown on Sign in) -->
            <div id="forgot-password-link" class="w-full text-center mt-2 hidden">
                <a href="#" class="text-xs font-bold text-gray-700 hover:text-black hover:underline">Forgot password?</a>
            </div>

            <!-- Divider -->
            <div class="w-full relative flex items-center mt-4 mb-4 sm:mt-6 sm:mb-6">
                <div class="flex-grow border-t border-gray-400/40"></div>
                <span class="flex-shrink-0 mx-4 text-[10px] sm:text-xs text-gray-700 font-bold uppercase tracking-wide">OR</span>
                <div class="flex-grow border-t border-gray-400/40"></div>
            </div>

            <!-- Social Buttons -->
            <div class="w-full flex gap-3 mb-2 sm:mb-4">
                <button type="button" class="w-full bg-white/40 hover:bg-white/70 backdrop-blur-md border border-white/50 rounded-2xl py-2.5 sm:py-3 flex justify-center items-center gap-2.5 transition-colors shadow-sm">
                    <svg class="w-4 h-4" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    <span class="text-sm font-bold text-gray-900">Continue with Google</span>
                </button>
            </div>

            <!-- Footer Text -->
            <div class="text-center text-xs text-gray-700 font-bold mt-2">
                <span id="footer-text">Already have an account?</span> 
                <button type="button" onclick="switchTab(isSignUpState ? 'signin' : 'signup')" id="footer-link" class="text-gray-900 hover:underline ml-1">Sign in</button>
            </div>
            
        </form>
    </div>

    <!-- Script for Toggling Forms & Input Handling -->
    <script>
        let isSignUpState = true;
        
        document.addEventListener('DOMContentLoaded', () => {
            if (window.location.hash === '#signin') {
                switchTab('signin');
            } else {
                switchTab('signup');
            }
        });

        function switchTab(tab) {
            isSignUpState = tab === 'signup';
            
            // Toggle Pill UI
            const toggleBg = document.getElementById('toggle-bg');
            const btnSignin = document.getElementById('btn-signin');
            const btnSignup = document.getElementById('btn-signup');
            
            if (isSignUpState) {
                toggleBg.style.transform = 'translateX(100%)';
                btnSignup.classList.add('font-bold', 'text-gray-900');
                btnSignup.classList.remove('font-medium', 'text-gray-700');
                btnSignin.classList.add('font-medium', 'text-gray-700');
                btnSignin.classList.remove('font-bold', 'text-gray-900');
            } else {
                toggleBg.style.transform = 'translateX(0)';
                btnSignin.classList.add('font-bold', 'text-gray-900');
                btnSignin.classList.remove('font-medium', 'text-gray-700');
                btnSignup.classList.add('font-medium', 'text-gray-700');
                btnSignup.classList.remove('font-bold', 'text-gray-900');
            }

            // Toggle Form Elements
            document.getElementById('name-block').style.display = isSignUpState ? 'flex' : 'none';
            document.getElementById('confirm-password-block').style.display = isSignUpState ? 'flex' : 'none';
            document.getElementById('terms-container').style.display = isSignUpState ? 'flex' : 'none';
            document.getElementById('forgot-password-link').style.display = isSignUpState ? 'none' : 'block';

            // Update Text
            document.getElementById('form-title').innerText = isSignUpState ? 'Registration' : 'Welcome Back';
            document.getElementById('form-subtitle').innerText = isSignUpState ? 'Step into the ultimate student network.' : 'Ready to pick up where you left off?';
            document.getElementById('submit-text').innerText = isSignUpState ? 'Create Account' : 'Sign In';
            
            document.getElementById('footer-text').innerText = isSignUpState ? 'Already have an account?' : "Don't have an account?";
            
            const footerLink = document.getElementById('footer-link');
            footerLink.innerText = isSignUpState ? 'Sign in' : 'Sign up';
        }

        // Initialize state
        switchTab('signup');

        // Show green checkmarks when fields have content
        const inputs = document.querySelectorAll('.input-block input');
        inputs.forEach(input => {
            input.addEventListener('input', (e) => {
                const checkIcon = e.target.closest('.input-block').querySelector('.valid-check');
                if (e.target.value.trim().length > 0) {
                    checkIcon.classList.remove('hidden');
                } else {
                    checkIcon.classList.add('hidden');
                }
            });
        });
    </script>
</body>
</html>
